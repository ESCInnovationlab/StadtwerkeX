<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STADTWERKE X - 3D Landing</title>
    <!-- We load Three.js exactly as the implementation plan declared -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center;}
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1;}
        #ui-layer {
            position: absolute; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; pointer-events: none;
            transition: opacity 0.5s;
        }
        .title {
            color: #fff; font-size: 8vw; letter-spacing: 0.1em; margin: 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); font-weight: 800;
        }
        .subtitle {
            color: #aaa; font-size: 1.5vw; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 3rem; margin-top: 0;
        }
        .btn-init {
            pointer-events: auto;
            padding: 1.2rem 4rem; font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(59, 130, 246, 0.5);
            color: #fff; border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .btn-init:hover {
            background: rgba(59, 130, 246, 0.2); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1 class="title">STADTWERKE X</h1>
        <p class="subtitle">INFRASTRUCTURE INTELLIGENCE UNIT</p>
        <button class="btn-init" id="initBtn">SYSTEMSTART</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020408);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(10, 5, -5);
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x4b6584, 0x000000, 0.3);
        scene.add(hemiLight);

        const textureLoader = new THREE.TextureLoader();
        const tColor = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const tSpec = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const tNorm = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthGeo = new THREE.SphereGeometry(5, 64, 64);
        const earthMat = new THREE.MeshStandardMaterial({
            map: tColor,
            normalMap: tNorm,
            roughnessMap: tSpec,
            roughness: 0.8,
            metalness: 0.2
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        // Vanilla WebGL Glow Hack
        const haloGeo = new THREE.SphereGeometry(5.1, 64, 64);
        const haloMat = new THREE.MeshPhysicalMaterial({
            color: 0x4b90ff,
            transparent: true,
            opacity: 0.3,
            roughness: 1,
            transmission: 0.5,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending
        });
        const haloMesh = new THREE.Mesh(haloGeo, haloMat);
        earthGroup.add(haloMesh);

        const getCartesian = (lat, lon, r) => {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(r * Math.sin(phi) * Math.cos(theta)),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        };
        const targetPos = getCartesian(51.1657, 10.4515, 6.0);
        const targetLookAt = new THREE.Vector3(0, 0, 0);

        let isZooming = false;
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if(earthGroup) {
                earthGroup.rotation.y += 0.0005;
            }
            if (!isZooming) {
                const t = clock.getElapsedTime();
                camera.position.y = Math.sin(t * 0.5) * 0.1;
                camera.position.x = Math.cos(t * 0.3) * 0.1;
            }
            camera.lookAt(targetLookAt);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('initBtn').addEventListener('click', () => {
            isZooming = true;
            document.getElementById('ui-layer').style.opacity = '0';
            
            const tl = gsap.timeline({
                onComplete: () => {
                    console.log("Zoom complete, dispatching to Streamlit parent...");
                    try {
                        let btns = window.parent.document.querySelectorAll("button");
                        for (let bt of btns) {
                            if (bt.innerText && bt.innerText.includes("SYSTEMSTART_HIDDEN")) {
                                bt.click();
                                break;
                            }
                        }
                    } catch(e) {
                        console.error("Context communication blocked", e);
                    }
                }
            });

            tl.to(camera.position, {
                z: camera.position.z + 1.5,
                duration: 0.5,
                ease: "power2.out"
            }, 0)
            .to(camera, {
                fov: 85,
                duration: 0.5,
                onUpdate: () => camera.updateProjectionMatrix()
            }, 0);

            tl.to(camera.position, {
                x: targetPos.x,
                y: targetPos.y,
                z: targetPos.z,
                duration: 1.5,
                ease: "expo.inOut"
            }, 0.5)
            .to(camera, {
                fov: 30, // Extremely flattened FOV on arrival
                duration: 1.5,
                ease: "power3.out",
                onUpdate: () => camera.updateProjectionMatrix()
            }, 0.8);
        });
    </script>
</body>
</html>
